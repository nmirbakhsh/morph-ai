# Morph AI MCP server config.
# Each entry defines a Model Context Protocol server to bridge.
# transport: "stdio" spawns a subprocess; "sse" / "http" connect over the network.

mcp_servers:
  # Wikipedia MCP is a Python package; we run it with uvx so it auto-installs
  # into an isolated env on first launch.
  - name: wikipedia
    transport: stdio
    # Wrapped wikipedia-mcp-server that injects a User-Agent (Wikipedia 403s
    # without one). Runs in its own Python 3.13 venv because the upstream
    # package requires py>=3.13 while the backend uses py3.12.
    # Bootstrap once on the host:
    #   uv venv --python 3.13 wikipedia-venv
    #   wikipedia-venv/bin/python -m ensurepip
    #   wikipedia-venv/bin/python -m pip install wikipedia-mcp-server
    command: /root/morph-ai/wikipedia-venv/bin/python
    args: ["/root/morph-ai/wikipedia_mcp_wrapper.py"]
    description: "Search and retrieve Wikipedia articles"
    enabled: true

  # Add more MCP servers below. Examples:
  #
  # - name: filesystem
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/dir"]
  #
  # - name: postgres
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@modelcontextprotocol/server-postgres", "postgresql://localhost/db"]
